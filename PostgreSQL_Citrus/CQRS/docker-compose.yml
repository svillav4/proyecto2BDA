version: '3.8'

services:
  postgres-command:
    image: postgres:16
    container_name: postgres_command
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DB=command_db
    ports:
      - "5450:5432"
    volumes:
      - ./init-db/init-command.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - cqrs-network

  postgres-query:
    image: postgres:16
    container_name: postgres_query
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DB=query_db
    ports:
      - "5451:5432"
    volumes:
      - ./init-db/init-query.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - cqrs-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - cqrs-network

networks:
  cqrs-network:
    driver: bridge